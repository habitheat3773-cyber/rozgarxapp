name: rozgarx
description: "RozgarX - AI-Powered Government Job Alert App. Sarkari Naukri, Ek Click Mein."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase Core ──────────────────────────────────────
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.8.5
  firebase_analytics: ^10.10.5
  firebase_storage: ^11.6.9
  firebase_remote_config: ^4.3.13
  firebase_performance: ^0.9.3+13
  firebase_crashlytics: ^3.4.16

  # ── State Management ──────────────────────────────────
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # ── UI & Animations ───────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  fl_chart: ^0.67.0
  badges: ^3.1.2
  flutter_staggered_animations: ^1.1.1
  rive: ^0.13.6
  confetti: ^0.7.0
  animated_text_kit: ^4.2.2
  page_transition: ^2.1.0
  smooth_page_indicator: ^1.2.0+3
  flutter_parallax: ^1.0.0
  liquid_pull_to_refresh: ^3.0.1
  sliding_up_panel: ^2.0.0+1
  expandable: ^5.0.1
  flip_card: ^0.7.0
  percent_indicator: ^4.2.3
  step_progress_indicator: ^1.0.2
  skeleton_loader: ^3.0.1

  # ── Navigation ────────────────────────────────────────
  go_router: ^13.2.1

  # ── Local Storage ─────────────────────────────────────
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3

  # ── Networking ────────────────────────────────────────
  http: ^1.2.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Notifications ─────────────────────────────────────
  flutter_local_notifications: ^17.2.2
  awesome_notifications: ^0.9.3+1

  # ── Utils ─────────────────────────────────────────────
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.3
  collection: ^1.18.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  app_tracking_transparency: ^2.0.4
  permission_handler: ^11.3.1
  in_app_review: ^2.0.9
  rate_my_app: ^2.0.0
  workmanager: ^0.5.2
  flutter_background_service: ^5.0.5

  # ── PDF & Documents ───────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1
  flutter_pdfview: ^1.3.2
  open_file: ^3.3.2
  file_picker: ^8.0.3

  # ── Ads ───────────────────────────────────────────────
  google_mobile_ads: ^5.1.0

  # ── Auth extras ───────────────────────────────────────
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # ── Media ─────────────────────────────────────────────
  image_picker: ^1.1.1
  image_cropper: ^7.0.5

  # ── Search & AI-style ─────────────────────────────────

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E3A8A"
  adaptive_icon_foreground: "assets/icons/app_icon_fg.png"

flutter_native_splash:
  color: "#1E3A8A"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/
    - assets/lottie/
    - assets/rive/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
          
