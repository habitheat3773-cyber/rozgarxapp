name: rozgarx
description: "RozgarX - AI-Powered Government Job Alert App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.8.5
  firebase_analytics: ^10.10.5
  firebase_storage: ^11.6.9
  firebase_remote_config: ^4.3.13
  firebase_performance: ^0.9.3+13
  firebase_crashlytics: ^3.4.16

  # ── State Management ──────────────────────────────────────
  provider: ^6.1.2

  # ── UI & Animations ───────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  fl_chart: ^0.67.0
  badges: ^3.1.2
  flutter_staggered_animations: ^1.1.1
  animated_text_kit: ^4.2.2
  smooth_page_indicator: ^1.2.0+3
  percent_indicator: ^4.2.3

  # ── Navigation ────────────────────────────────────────────
  go_router: ^13.2.1

  # ── Local Storage ─────────────────────────────────────────
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3

  # ── Networking ────────────────────────────────────────────
  http: ^1.2.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Notifications ─────────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Utils ─────────────────────────────────────────────────
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  intl: ^0.18.1
  uuid: ^4.4.0
  crypto: ^3.0.3
  collection: ^1.18.0
  equatable: ^2.0.5
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  permission_handler: ^11.3.1
  in_app_review: ^2.0.9
  workmanager: ^0.5.2

  # ── PDF & Documents ───────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1
  open_file: ^3.3.2
  file_picker: ^8.0.3

  # ── Ads ───────────────────────────────────────────────────
  google_mobile_ads: ^5.1.0

  # ── Auth ──────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Media ─────────────────────────────────────────────────
  image_picker: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E3A8A"
  adaptive_icon_foreground: "assets/icons/app_icon_fg.png"

flutter_native_splash:
  color: "#1E3A8A"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
          
