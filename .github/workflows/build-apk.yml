name: RozgarX — Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  # ─── JOB 1: Validate ──────────────────────────────────────────────
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > flutter_app/android/app/google-services.json

      - name: Create firebase_options.dart
        run: |
          echo '${{ secrets.FIREBASE_OPTIONS_DART }}' > flutter_app/lib/firebase_options.dart

      - name: Create asset folders
        run: |
          mkdir -p flutter_app/assets/images
          mkdir -p flutter_app/assets/animations
          mkdir -p flutter_app/assets/icons
          mkdir -p flutter_app/assets/fonts
          mkdir -p flutter_app/assets/lottie
          touch flutter_app/assets/images/.gitkeep
          touch flutter_app/assets/animations/.gitkeep
          touch flutter_app/assets/icons/.gitkeep
          touch flutter_app/assets/fonts/.gitkeep
          touch flutter_app/assets/lottie/.gitkeep

      - name: Get Dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Check Formatting
        working-directory: flutter_app
        run: dart format .
        continue-on-error: true

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze --no-fatal-warnings --no-fatal-infos
        continue-on-error: true

  # ─── JOB 2: Build Debug APK ───────────────────────────────────────
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > flutter_app/android/app/google-services.json

      - name: Create firebase_options.dart
        run: |
          echo '${{ secrets.FIREBASE_OPTIONS_DART }}' > flutter_app/lib/firebase_options.dart

      - name: Create asset folders
        run: |
          mkdir -p flutter_app/assets/images
          mkdir -p flutter_app/assets/animations
          mkdir -p flutter_app/assets/icons
          mkdir -p flutter_app/assets/fonts
          mkdir -p flutter_app/assets/lottie
          touch flutter_app/assets/images/.gitkeep
          touch flutter_app/assets/animations/.gitkeep
          touch flutter_app/assets/icons/.gitkeep
          touch flutter_app/assets/fonts/.gitkeep
          touch flutter_app/assets/lottie/.gitkeep

      - name: Get Dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Debug APK
        working-directory: flutter_app
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ─── JOB 3: Build Release APK ─────────────────────────────────────
  build-release:
    name: 🚀 Build Release APK
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > flutter_app/android/app/google-services.json

      - name: Create firebase_options.dart
        run: |
          echo '${{ secrets.FIREBASE_OPTIONS_DART }}' > flutter_app/lib/firebase_options.dart

      - name: Create keystore from secret
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > flutter_app/android/app/rozgarx-release.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > flutter_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> flutter_app/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> flutter_app/android/key.properties
          echo "storeFile=rozgarx-release.jks" >> flutter_app/android/key.properties

      - name: Create asset folders
        run: |
          mkdir -p flutter_app/assets/images
          mkdir -p flutter_app/assets/animations
          mkdir -p flutter_app/assets/icons
          mkdir -p flutter_app/assets/fonts
          mkdir -p flutter_app/assets/lottie
          touch flutter_app/assets/images/.gitkeep
          touch flutter_app/assets/animations/.gitkeep
          touch flutter_app/assets/icons/.gitkeep
          touch flutter_app/assets/fonts/.gitkeep
          touch flutter_app/assets/lottie/.gitkeep

      - name: Get Dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Release APK
        working-directory: flutter_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build AAB for Play Store
        working-directory: flutter_app
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep 'version:' flutter_app/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.version.outputs.version }}
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-v${{ steps.version.outputs.version }}
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: RozgarX v${{ steps.version.outputs.version }}
          body: Auto build by GitHub Actions
          files: |
            flutter_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_app/build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
