name: RozgarX — Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Create secrets
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > flutter_app/android/app/google-services.json
          echo '${{ secrets.FIREBASE_OPTIONS_DART }}' > flutter_app/lib/firebase_options.dart
          mkdir -p flutter_app/assets/{images,animations,icons,fonts,lottie}
      - name: Get Dependencies
        working-directory: flutter_app
        run: flutter pub get
      - name: Build Debug APK
        working-directory: flutter_app
        run: flutter build apk --debug --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Create secrets
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > flutter_app/android/app/google-services.json
          echo '${{ secrets.FIREBASE_OPTIONS_DART }}' > flutter_app/lib/firebase_options.dart
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > flutter_app/android/app/rozgarx-release.jks
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > flutter_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> flutter_app/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> flutter_app/android/key.properties
          echo "storeFile=rozgarx-release.jks" >> flutter_app/android/key.properties
          mkdir -p flutter_app/assets/{images,animations,icons,fonts,lottie}
      - name: Get Dependencies
        working-directory: flutter_app
        run: flutter pub get
      - name: Build Release APK
        working-directory: flutter_app
        run: flutter build apk --release --no-tree-shake-icons
      - name: Build AAB
        working-directory: flutter_app
        run: flutter build appbundle --release --no-tree-shake-icons
      - name: Get Version
        id: ver
        run: |
          echo "version=$(grep 'version:' flutter_app/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.ver.outputs.version }}
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
      - uses: actions/upload-artifact@v4
        with:
          name: release-aab-v${{ steps.ver.outputs.version }}
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.ver.outputs.version }}-build${{ github.run_number }}
          name: RozgarX v${{ steps.ver.outputs.version }}
          body: Auto build by GitHub Actions
          files: |
            flutter_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_app/build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
